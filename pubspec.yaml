name: dartapi_core
description: Core utilities for building typed, structured REST APIs in Dart, including routing, validation, and middleware support.
version: 0.1.7
repository: https://github.com/akashgk/dartapi_core
homepage: https://github.com/akashgk/dartapi_core
issue_tracker: https://github.com/akashgk/dartapi_core/issues

environment:
  sdk: ^3.7.2

# Add regular dependencies here.
dependencies:
  mime: ^2.0.0
  shelf: ^1.4.2
  dart_jsonwebtoken: ^3.4.1
  shelf_router: ^1.1.3
  shelf_cors_headers: ^0.1.2
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.3


dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0

false_secrets:
  - /test/auth_test.dart
